name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install and Build Frontend
        run: |
          npm install
          npm run build

      - name: Build zip
        run: |
          zip -r wifi-analyzer-pro-${{ github.ref_name }}.zip dist/ wifi_analyzer_backend/ install_windows.bat README.md

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: wifi-analyzer-pro-${{ github.ref_name }}.zip
